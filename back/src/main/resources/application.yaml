server:
  address: 0.0.0.0
  port: ${APP_PORT:8000}
  tomcat:
    threads:
      max: 50
      min-spare: 2
    max-connections: 500
    accept-count: 10

spring:
  web:
    resources:
      add-mappings: true
  docker:
    compose:
      files: ${DOCKER_COMPOSE_PATH:../docker-compose.yaml}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15435/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 1
      idle-timeout: 300000
      max-lifetime: 600000

  sql:
    init:
      mode: always
      data-locations: ${SQL_INIT_PATH:classpath:db/init.sql}
      continue-on-error: true

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 10
        query:
          plan_cache_max_size: 64

oauth2:
  discord:
    token-uri: https://discord.com/api/oauth2/token
    user-info-uri: https://discord.com/api/users/@me
    base-url: https://discord.com/api
    authorization-grant-type: authorization_code
    client-id: ${CLIENT_ID:changeme}
    client-secret: ${CLIENT_SECRET:changeme}
    token: ${TOKEN:changeme}
    scope: identify email
    redirect-uri: ${BASE_URL:changeme}/api/oauth/discord/redirect

jwt:
  secret: ${JWT_SECRET:changeme}

waktool:
  base-url: ${FRONT_URL:changeme}
  resources-path: ${RESOURCES_PATH:file:front/dist/}
