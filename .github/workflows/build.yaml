name: CI

on:
  pull_request:
    branches: [master]
  workflow_call:
    secrets:
      SONAR_TOKEN:
        required: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Frontend: lint & build
  # ---------------------------------------------------------------------------
  build-front:
    name: Build frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: front/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --shamefully-hoist

      - name: Build
        run: pnpm run build

  # ---------------------------------------------------------------------------
  # Backend: build, test & SonarCloud analysis
  # ---------------------------------------------------------------------------
  build-back:
    name: Build & analyze backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build & verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${SONAR_TOKEN:-}" ]; then
            set -- org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=waktoolbox_waktool
          else
            echo "SONAR_TOKEN is not set; skipping SonarCloud analysis."
            set --
          fi
          mvn -B verify "$@"
